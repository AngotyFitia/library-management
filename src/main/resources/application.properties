spring.application.name=library-management
server.port=9090

# ===== H2 Database =====
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# Secret base64 d'au moins 256 bits (32 octets) pour HS256
app.jwt.secret=bGlicmFyeU1hbmFnZW1lbnRTZWNyZXRLZXlNQkRTMjAyNTIwMjZTdXBlclNlY3VyZUtleQ==
# Durée de validité : 24h en millisecondes
app.jwt.expiration=86400000

# ===== SpringDoc / Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
